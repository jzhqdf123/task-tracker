<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金石机器人售后任务跟进表</title>
<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f8f9fa;
    --card: #ffffff;
    --border: #e9ecef;
    --text: #212529;
    --text-secondary: #6c757d;
    --red: #ff6b6b;
    --red-bg: #fff5f5;
    --red-border: #ffc9c9;
    --yellow: #fcc419;
    --yellow-bg: #fff9db;
    --yellow-border: #ffe066;
    --green: #51cf66;
    --green-bg: #ebfbee;
    --green-border: #8ce99a;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 10px;
    --blue: #5c7cfa;
    --blue-bg: #edf2ff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Nickname overlay */
  .nickname-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 20000;
    display: flex; align-items: center; justify-content: center;
  }
  .nickname-box {
    background: var(--card); border-radius: 16px; padding: 32px 36px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2); text-align: center; max-width: 360px; width: 90%;
  }
  .nickname-box h2 { font-size: 20px; margin-bottom: 8px; }
  .nickname-box p { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .nickname-box input {
    width: 100%; border: 2px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 16px; outline: none; transition: border-color 0.2s;
    text-align: center;
  }
  .nickname-box input:focus { border-color: var(--blue); }
  .nickname-box button {
    margin-top: 16px; width: 100%; background: var(--blue); color: white;
    border: none; border-radius: 10px; padding: 10px; font-size: 15px;
    font-weight: 700; cursor: pointer; transition: opacity 0.15s;
  }
  .nickname-box button:hover { opacity: 0.85; }

  /* Loading */
  .loading-bar {
    position: fixed; top: 0; left: 0; height: 3px; background: var(--blue);
    z-index: 99999; transition: width 0.3s;
    animation: loadingPulse 1.5s infinite;
  }
  @keyframes loadingPulse {
    0% { width: 0%; left: 0; }
    50% { width: 60%; left: 20%; }
    100% { width: 0%; left: 100%; }
  }
  .loading-bar.hidden { display: none; }

  /* Online indicator */
  .online-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    background: var(--green); margin-right: 4px; animation: onlinePulse 2s infinite;
  }
  .online-dot.offline { background: var(--red); animation: none; }
  @keyframes onlinePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header-hint { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .stats { display: flex; gap: 14px; font-size: 13px; color: var(--text-secondary); align-items: center; flex-wrap: wrap; }
  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .user-tag {
    font-size: 11px; font-weight: 700; color: var(--blue); background: var(--blue-bg);
    padding: 2px 8px; border-radius: 10px;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

  .add-bar {
    background: var(--card); border-radius: var(--radius); padding: 12px 16px;
    display: flex; gap: 10px; align-items: center; box-shadow: var(--shadow); margin-bottom: 20px;
  }
  .add-bar input { flex: 1; border: none; outline: none; font-size: 14px; color: var(--text); background: transparent; }
  .add-bar input::placeholder { color: #adb5bd; }
  .add-btn {
    background: var(--text); color: white; border: none; border-radius: 6px;
    padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }

  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .column {
    background: var(--bg); border-radius: 12px; min-height: 300px;
    border: 2px solid transparent; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .column.drag-over-todo { border-color: var(--red-border); background: var(--red-bg); box-shadow: 0 0 0 3px rgba(255,107,107,0.1); }
  .column.drag-over-doing { border-color: var(--yellow-border); background: var(--yellow-bg); box-shadow: 0 0 0 3px rgba(252,196,25,0.1); }
  .column.drag-over-done { border-color: var(--green-border); background: var(--green-bg); box-shadow: 0 0 0 3px rgba(81,207,102,0.1); }

  .column-inner { padding: 8px; min-height: 260px; }

  .column-header {
    display: flex; align-items: center; gap: 8px; padding: 12px 12px 8px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
  }
  .column-header .count { font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 700; }

  .col-todo .column-header { color: var(--red); }
  .col-todo .column-header .dot { background: var(--red); }
  .col-todo .column-header .count { background: var(--red-bg); color: var(--red); }
  .col-doing .column-header { color: #e8a400; }
  .col-doing .column-header .dot { background: var(--yellow); }
  .col-doing .column-header .count { background: var(--yellow-bg); color: #e8a400; }
  .col-done .column-header { color: #2b9e42; }
  .col-done .column-header .dot { background: var(--green); }
  .col-done .column-header .count { background: var(--green-bg); color: #2b9e42; }

  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cards { display: flex; flex-direction: column; gap: 8px; min-height: 80px; }

  /* Card */
  .card {
    background: var(--card); border-radius: var(--radius); padding: 14px 16px;
    box-shadow: var(--shadow); cursor: grab; transition: box-shadow 0.2s, transform 0.2s, opacity 0.2s;
    position: relative; user-select: none; touch-action: none;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.4; transform: scale(0.95); box-shadow: none; }

  .card::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 3px; border-radius: 0 3px 3px 0;
  }
  .card[data-status="todo"]::before { background: var(--red); }
  .card[data-status="doing"]::before { background: var(--yellow); }
  .card[data-status="done"]::before { background: var(--green); }

  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; word-break: break-word; padding-left: 6px; }
  .card[data-status="done"] .card-title { text-decoration: line-through; color: var(--text-secondary); }

  .card-project {
    display: inline-block; font-size: 10px; font-weight: 700; color: #5c7cfa; background: #edf2ff;
    padding: 1px 7px; border-radius: 4px; margin-bottom: 4px; margin-left: 6px; letter-spacing: 0.2px;
    vertical-align: middle;
  }

  .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-secondary); padding-left: 6px; }
  .card-assignee { display: flex; align-items: center; gap: 4px; }
  .card-assignee .avatar {
    width: 18px; height: 18px; border-radius: 50%; background: var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text-secondary);
  }
  .card-date { font-size: 11px; }
  .card-deadline {
    font-size: 11px; color: var(--text-secondary); font-weight: 600;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .card-deadline.overdue { color: var(--red); }
  .card-deadline-label { font-weight: 400; color: var(--text-secondary); font-size: 10px; }
  .deadline-add-btn {
    background: none; border: 1px dashed var(--red-border); border-radius: 4px;
    font-size: 10px; color: var(--red); padding: 1px 6px; cursor: pointer;
    transition: all 0.15s; font-weight: 500;
  }
  .deadline-add-btn:hover { background: var(--red-bg); border-style: solid; }

  .card-actions { display: flex; gap: 4px; margin-top: 10px; padding-left: 6px; }
  .status-btn {
    flex: 1; border: none; border-radius: 6px; padding: 5px 0; font-size: 11px;
    font-weight: 600; cursor: pointer; transition: all 0.15s; opacity: 0.5;
  }
  .status-btn:hover { opacity: 1; transform: scale(1.05); }
  .status-btn.active { opacity: 1; }
  .btn-todo { background: var(--red-bg); color: var(--red); }
  .btn-todo.active { background: var(--red); color: white; }
  .btn-doing { background: var(--yellow-bg); color: #e8a400; }
  .btn-doing.active { background: var(--yellow); color: white; }
  .btn-done { background: var(--green-bg); color: #2b9e42; }
  .btn-done.active { background: var(--green); color: white; }

  .card-delete {
    position: absolute; top: 6px; right: 8px; background: none; border: none;
    color: #ced4da; cursor: pointer; font-size: 14px; line-height: 1; padding: 2px 4px;
    border-radius: 4px; opacity: 0; transition: opacity 0.15s, color 0.15s;
  }
  .card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: var(--red); }

  /* History button on card */
  .card-history {
    position: absolute; top: 6px; right: 28px; background: none; border: none;
    color: #ced4da; cursor: pointer; font-size: 13px; line-height: 1; padding: 2px 4px;
    border-radius: 4px; opacity: 0; transition: opacity 0.15s, color 0.15s;
  }
  .card:hover .card-history { opacity: 1; }
  .card-history:hover { color: var(--blue); }

  /* Note */
  .card-note { margin-top: 8px; padding-left: 6px; }
  .note-toggle {
    background: none; border: none; color: var(--text-secondary); font-size: 12px;
    cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 2px 0; transition: color 0.15s;
  }
  .note-toggle:hover { color: var(--text); }
  .note-preview {
    font-size: 12px; color: var(--text-secondary); line-height: 1.4; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
  }
  .note-area { margin-top: 6px; display: none; }
  .note-area.open { display: block; }
  .note-area textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
    font-size: 12px; font-family: inherit; color: var(--text); resize: vertical;
    min-height: 52px; outline: none; transition: border-color 0.15s; line-height: 1.5;
  }
  .note-area textarea:focus { border-color: #adb5bd; }
  .note-area textarea::placeholder { color: #ced4da; }
  .note-save-hint { font-size: 10px; color: #ced4da; margin-top: 3px; text-align: right; }

  /* Photo attachments */
  .card-photos { margin-top: 8px; padding-left: 6px; }
  .photo-toggle {
    background: none; border: none; color: var(--text-secondary); font-size: 12px;
    cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 2px 0; transition: color 0.15s;
  }
  .photo-toggle:hover { color: var(--text); }

  .photo-grid {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
  }

  .photo-thumb {
    width: 56px; height: 56px; border-radius: 6px; overflow: hidden;
    position: relative; cursor: pointer; border: 1px solid var(--border);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .photo-thumb:hover { transform: scale(1.08); box-shadow: var(--shadow-hover); }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .photo-thumb .photo-remove {
    position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
    background: rgba(0,0,0,0.55); color: white; border: none; border-radius: 50%;
    font-size: 10px; line-height: 1; display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: opacity 0.15s;
  }
  .photo-thumb:hover .photo-remove { opacity: 1; }

  .photo-add-btn {
    width: 56px; height: 56px; border-radius: 6px; border: 2px dashed var(--border);
    background: transparent; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 20px; color: #ced4da; transition: all 0.15s;
  }
  .photo-add-btn:hover { border-color: #adb5bd; color: var(--text-secondary); background: var(--bg); }

  .photo-count { font-size: 11px; color: #ced4da; margin-left: 2px; }

  /* Lightbox */
  .lightbox {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 10000; display: none;
    align-items: center; justify-content: center; cursor: zoom-out;
    animation: lbFadeIn 0.2s ease;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .lightbox-close {
    position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,0.15);
    border: none; color: white; font-size: 24px; width: 40px; height: 40px;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.3); }

  @keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }

  .empty {
    text-align: center; padding: 24px 12px; color: #ced4da; font-size: 13px;
    border: 2px dashed var(--border); border-radius: var(--radius); margin: 0 4px;
  }

  .progress-wrap { width: 100px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  /* Undo / Redo buttons */
  .undo-btn, .redo-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 12px; font-size: 12px; font-weight: 600; color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s;
    white-space: nowrap;
  }
  .undo-btn:hover:not(:disabled), .redo-btn:hover:not(:disabled) { border-color: var(--text-secondary); color: var(--text); background: var(--bg); }
  .undo-btn:disabled, .redo-btn:disabled { opacity: 0.3; cursor: default; }
  .undo-btn .undo-icon, .redo-btn .redo-icon { font-size: 14px; }

  /* Undo toast */
  .undo-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: white; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 9999; display: flex; align-items: center; gap: 10px;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    opacity: 0; pointer-events: none;
  }
  .undo-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .undo-toast-btn {
    background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 4px;
    padding: 4px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
    transition: background 0.15s;
  }
  .undo-toast-btn:hover { background: rgba(255,255,255,0.35); }

  /* History modal */
  .history-modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 15000;
    display: flex; align-items: center; justify-content: center;
  }
  .history-modal.hidden { display: none; }
  .history-panel {
    background: var(--card); border-radius: 16px; padding: 24px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2); max-width: 480px; width: 90%;
    max-height: 70vh; overflow-y: auto;
  }
  .history-panel h3 { font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .history-panel .close-btn {
    margin-left: auto; background: none; border: none; font-size: 18px;
    cursor: pointer; color: var(--text-secondary);
  }
  .history-item {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
    background: var(--bg); font-size: 12px; cursor: pointer;
    transition: background 0.15s; border: 1px solid transparent;
  }
  .history-item:hover { background: var(--blue-bg); border-color: var(--blue); }
  .history-item .h-time { color: var(--text-secondary); font-size: 11px; }
  .history-item .h-user { color: var(--blue); font-weight: 700; font-size: 11px; }
  .history-item .h-action { color: var(--text); margin-top: 2px; }
  .history-item .h-restore {
    float: right; background: var(--blue); color: white; border: none;
    border-radius: 4px; padding: 3px 10px; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .history-item .h-restore:hover { opacity: 0.8; }
  .history-empty { text-align: center; color: #ced4da; padding: 20px; font-size: 13px; }

  @media (max-width: 640px) {
    .board { grid-template-columns: 1fr; gap: 16px; }
    .header { flex-direction: column; gap: 8px; align-items: flex-start; }
    .add-bar { flex-wrap: wrap; }
    .add-bar input { min-width: 100%; }
    .column { min-height: 120px; }
    .note-preview { max-width: 160px; }
    .stats { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- Nickname overlay -->
<div class="nickname-overlay" id="nickname-overlay">
  <div class="nickname-box">
    <h2>👋 输入你的昵称</h2>
    <p>团队成员通过昵称识别操作者</p>
    <input type="text" id="nickname-input" placeholder="你的名字" maxlength="10" />
    <button onclick="confirmNickname()">进入任务板</button>
  </div>
</div>

<!-- Loading bar -->
<div class="loading-bar" id="loading-bar"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<div class="undo-toast" id="undo-toast">
  <span id="undo-toast-msg">已撤回</span>
  <button class="undo-toast-btn" onclick="undo()">撤回</button>
</div>

<!-- History modal -->
<div class="history-modal hidden" id="history-modal" onclick="if(event.target===this)closeHistory()">
  <div class="history-panel">
    <h3>📜 操作历史 <button class="close-btn" onclick="closeHistory()">×</button></h3>
    <div id="history-list"></div>
  </div>
</div>

<div class="header">
  <div>
    <h1>📋 金石机器人售后任务跟进表</h1>
    <div class="header-hint">
      <span class="online-dot" id="online-dot"></span>
      <span id="online-text">连接中...</span>
      · 拖拽或点按钮切换状态 · Ctrl+Z 撤回 · Ctrl+Y 恢复
    </div>
  </div>
  <div class="stats">
    <span class="user-tag" id="user-tag" style="display:none"></span>
    <div class="stat-item"><span class="stat-dot" style="background:var(--red)"></span> 未开始 <span id="count-todo">0</span></div>
    <div class="stat-item"><span class="stat-dot" style="background:var(--yellow)"></span> 进行中 <span id="count-doing">0</span></div>
    <div class="stat-item"><span class="stat-dot" style="background:var(--green)"></span> 已完成 <span id="count-done">0</span></div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <button class="undo-btn" id="undo-btn" onclick="undo()" disabled title="撤回上一步 (Ctrl+Z)">
      <span class="undo-icon">↩</span> 撤回
    </button>
    <button class="redo-btn" id="redo-btn" onclick="redo()" disabled title="恢复 (Ctrl+Y)">
      <span class="redo-icon">↪</span> 恢复
    </button>
  </div>
</div>

<div class="container">
  <div class="add-bar">
    <input type="text" id="project-input" placeholder="项目" style="max-width:90px" />
    <input type="text" id="task-input" placeholder="输入任务，回车添加..." />
    <input type="text" id="assignee-input" placeholder="负责人" style="max-width:80px" />
    <input type="date" id="date-input" title="日期" />
    <button class="add-btn" onclick="addTask()">添加</button>
  </div>

  <div class="board">
    <div class="column col-todo" data-status="todo">
      <div class="column-header"><span class="dot"></span> 未开始 <span class="count" id="badge-todo">0</span></div>
      <div class="column-inner"><div class="cards" id="col-todo"></div></div>
    </div>
    <div class="column col-doing" data-status="doing">
      <div class="column-header"><span class="dot"></span> 进行中 <span class="count" id="badge-doing">0</span></div>
      <div class="column-inner"><div class="cards" id="col-doing"></div></div>
    </div>
    <div class="column col-done" data-status="done">
      <div class="column-header"><span class="dot"></span> 已完成 <span class="count" id="badge-done">0</span></div>
      <div class="column-inner"><div class="cards" id="col-done"></div></div>
    </div>
  </div>
</div>

<script>
// ========== CloudBase Config ==========
const ENV_ID = 'stonrobot-d3g5s2ly3a49aef17';
const app = cloudbase.init({ env: ENV_ID });
const db = app.database();

const STORAGE_KEY = 'task-tracker-data';
const PHOTO_MAX_KB = 200;
const MAX_UNDO = 20;

let tasks = [];
let currentUser = localStorage.getItem('task-tracker-nickname') || '';
let isOnline = false;
let watcher = null;

// Undo / Redo history
let undoStack = [];
let redoStack = [];
let toastTimer = null;

// ========== Auth & Init ==========
async function initApp() {
  try {
    // Anonymous auth
    const auth = app.auth();
    const loginState = await auth.getLoginState();
    if (!loginState) {
      await auth.signInAnonymously();
    }
    setOnline(true);

    // Load tasks from cloud
    await loadTasks();

    // Start realtime watcher
    startWatcher();

    // Hide loading
    document.getElementById('loading-bar').classList.add('hidden');
  } catch (err) {
    console.error('Init failed:', err);
    setOnline(false);
    // Fallback: load from localStorage
    tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    tasks.forEach(t => {
      if (!t.note) t.note = '';
      if (!t.photos) t.photos = [];
      if (!t.project) t.project = '';
      if (!t.deadline) t.deadline = '';
    });
    render();
    document.getElementById('loading-bar').classList.add('hidden');
    const errMsg = err && err.message ? err.message : String(err);
    showToast('连接失败: ' + errMsg);
  }
}

function setOnline(online) {
  isOnline = online;
  const dot = document.getElementById('online-dot');
  const text = document.getElementById('online-text');
  if (online) {
    dot.className = 'online-dot';
    text.textContent = '已连接';
  } else {
    dot.className = 'online-dot offline';
    text.textContent = '离线';
  }
}

function confirmNickname() {
  const input = document.getElementById('nickname-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  currentUser = name;
  localStorage.setItem('task-tracker-nickname', name);
  document.getElementById('nickname-overlay').style.display = 'none';
  document.getElementById('user-tag').textContent = name;
  document.getElementById('user-tag').style.display = 'inline-block';
  initApp();
}

// Show nickname screen or go directly
if (currentUser) {
  document.getElementById('nickname-overlay').style.display = 'none';
  document.getElementById('user-tag').textContent = currentUser;
  document.getElementById('user-tag').style.display = 'inline-block';
  initApp();
} else {
  document.getElementById('loading-bar').classList.add('hidden');
}

// ========== Data Layer ==========
function docToTask(doc) {
  return {
    _id: doc._id,
    id: doc.id || doc._id,
    project: doc.project || '',
    title: doc.title || '',
    assignee: doc.assignee || '',
    date: doc.date || '',
    deadline: doc.deadline || '',
    status: doc.status || 'todo',
    note: doc.note || '',
    photos: doc.photos || [],
    createdAt: doc.createdAt || null,
    updatedAt: doc.updatedAt || null
  };
}

async function loadTasks() {
  const res = await db.collection('tasks').limit(1000).get();
  tasks = res.data.map(docToTask);
  // Cache to localStorage
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  render();
}

async function addLog(taskId, action, detail, snapshot) {
  try {
    await db.collection('task_logs').add({
      taskId: taskId,
      user: currentUser,
      action: action,
      detail: detail,
      snapshot: snapshot ? JSON.parse(JSON.stringify(snapshot)) : null,
      time: new Date()
    });
  } catch (e) { console.warn('Log failed:', e); }
}

async function cloudAddTask(taskData) {
  pushUndo('添加任务');
  const data = {
    ...taskData,
    id: Date.now(),
    createdAt: new Date(),
    updatedAt: new Date()
  };
  try {
    const res = await db.collection('tasks').add(data);
    data._id = res.id;
    tasks.push(data);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    render();
    addLog(data.id, '添加任务', currentUser + ' 添加了任务: ' + data.title, data);
    showToast('已添加任务');
  } catch (e) {
    console.error('Add task failed:', e);
    showToast('添加失败，请重试');
  }
}

async function cloudUpdateTask(taskId, changes, logAction, logDetail) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  pushUndo(logAction);
  const snapshot = { ...t };
  Object.assign(t, changes);
  t.updatedAt = new Date();
  try {
    await db.collection('tasks').doc(t._id).update({ ...changes, updatedAt: new Date() });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    render();
    addLog(taskId, logAction, logDetail || logAction, snapshot);
  } catch (e) {
    console.error('Update failed:', e);
    showToast('更新失败，请重试');
  }
}

async function cloudDeleteTask(taskId) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  pushUndo('删除任务');
  const snapshot = { ...t };
  try {
    await db.collection('tasks').doc(t._id).remove();
    tasks = tasks.filter(t => t.id !== taskId);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    render();
    updateUndoRedoBtns();
    addLog(taskId, '删除任务', currentUser + ' 删除了任务: ' + snapshot.title, snapshot);
    showToast('已删除任务');
  } catch (e) {
    console.error('Delete failed:', e);
    showToast('删除失败，请重试');
  }
}

// ========== Realtime Watcher ==========
function startWatcher() {
  try {
    watcher = db.collection('tasks').watch({
      onChange: function(snapshot) {
        if (!snapshot.docs) return;
        // Full refresh from snapshot
        tasks = snapshot.docs.map(docToTask);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        render();
        setOnline(true);
      },
      onError: function(err) {
        console.error('Watch error:', err);
        setOnline(false);
        // Try to reconnect after 5s
        setTimeout(() => {
          if (watcher) { try { watcher.close(); } catch(e){} }
          startWatcher();
        }, 5000);
      }
    });
  } catch (e) {
    console.error('Watch start failed:', e);
  }
}

// ========== Undo / Redo ==========
function pushUndo(label) {
  undoStack.push({
    label: label,
    snapshot: JSON.parse(JSON.stringify(tasks))
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
  updateUndoRedoBtns();
}

async function undo() {
  if (undoStack.length === 0) return;
  const entry = undoStack.pop();
  redoStack.push({
    label: entry.label,
    snapshot: JSON.parse(JSON.stringify(tasks))
  });
  if (redoStack.length > MAX_UNDO) redoStack.shift();
  await restoreSnapshot(entry.snapshot);
  updateUndoRedoBtns();
  showToast('已撤回: ' + entry.label);
}

async function redo() {
  if (redoStack.length === 0) return;
  const entry = redoStack.pop();
  undoStack.push({
    label: entry.label,
    snapshot: JSON.parse(JSON.stringify(tasks))
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  await restoreSnapshot(entry.snapshot);
  updateUndoRedoBtns();
  showToast('已恢复: ' + entry.label);
}

async function restoreSnapshot(snapshot) {
  // Sync local tasks to match snapshot
  tasks = JSON.parse(JSON.stringify(snapshot));

  // Sync to cloud: delete all then re-add
  // This is a simplified approach for small data sets
  try {
    // Delete tasks not in snapshot
    const currentCloud = await db.collection('tasks').limit(1000).get();
    const snapshotIds = new Set(snapshot.map(t => t._id));
    for (const doc of currentCloud.data) {
      if (!snapshotIds.has(doc._id)) {
        await db.collection('tasks').doc(doc._id).remove();
      }
    }
    // Update or add tasks in snapshot
    for (const t of snapshot) {
      if (t._id) {
        await db.collection('tasks').doc(t._id).update({
          project: t.project, title: t.title, assignee: t.assignee,
          date: t.date, deadline: t.deadline, status: t.status,
          note: t.note, photos: t.photos, updatedAt: new Date()
        });
      }
    }
  } catch (e) {
    console.error('Restore snapshot failed:', e);
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  render();
}

function updateUndoRedoBtns() {
  document.getElementById('undo-btn').disabled = undoStack.length === 0;
  document.getElementById('redo-btn').disabled = redoStack.length === 0;
}

function showToast(msg) {
  const toast = document.getElementById('undo-toast');
  document.getElementById('undo-toast-msg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ========== Render ==========
function render() {
  const cols = { todo: [], doing: [], done: [] };
  tasks.forEach(t => cols[t.status] && cols[t.status].push(t));

  ['todo', 'doing', 'done'].forEach(status => {
    const container = document.getElementById('col-' + status);
    container.innerHTML = '';
    const list = cols[status].sort((a, b) => {
      const aKey = a.date || '';
      const bKey = b.date || '';
      if (aKey && bKey) return aKey.localeCompare(bKey);
      if (aKey) return -1;
      if (bKey) return 1;
      return 0;
    });
    if (list.length === 0) {
      container.innerHTML = '<div class="empty">拖拽到此处</div>';
    }
    list.forEach(t => container.appendChild(createCard(t)));
    document.getElementById('count-' + status).textContent = list.length;
    document.getElementById('badge-' + status).textContent = list.length;
  });

  const total = tasks.length;
  const done = cols.done.length;
  document.getElementById('progress-bar').style.width = (total ? Math.round(done / total * 100) : 0) + '%';
}

// ========== Card ==========
function toggleNote(id) {
  const area = document.querySelector(`.note-area[data-task-id="${id}"]`);
  if (!area) return;
  const isOpen = area.classList.contains('open');
  area.classList.toggle('open');
  if (!isOpen) {
    const ta = area.querySelector('textarea');
    if (ta) setTimeout(() => ta.focus(), 50);
  }
}

function triggerPhotoInput(id) {
  const input = document.getElementById('photo-input-' + id);
  if (input) input.click();
}

async function handlePhotoUpload(id, event) {
  const file = event.target.files[0];
  if (!file) return;
  const t = tasks.find(t => t.id === id);
  if (!t) return;

  compressImage(file, async (base64) => {
    try {
      // Upload to CloudBase storage
      const result = await app.uploadFile({
        cloudPath: 'photos/' + id + '/' + Date.now() + '.jpg',
        filePath: file
      });
      const fileID = result.fileID;

      // Get download URL
      const urlResult = await app.getTempFileURL({ fileList: [fileID] });
      const photoUrl = urlResult.fileList[0].tempFileURL;

      pushUndo('上传照片');
      t.photos = t.photos || [];
      t.photos.push(photoUrl);
      await db.collection('tasks').doc(t._id).update({ photos: t.photos, updatedAt: new Date() });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      render();
      addLog(id, '上传照片', currentUser + ' 上传了照片', null);
      showToast('已上传照片');
    } catch (e) {
      // Fallback to base64 if cloud upload fails
      console.warn('Cloud upload failed, using base64:', e);
      pushUndo('上传照片');
      t.photos = t.photos || [];
      t.photos.push(base64);
      try {
        await db.collection('tasks').doc(t._id).update({ photos: t.photos, updatedAt: new Date() });
      } catch(e2) {}
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      render();
      showToast('已上传照片（本地存储）');
    }
  });

  event.target.value = '';
}

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const maxDim = 800;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      let quality = 0.7;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);

      while (dataUrl.length > PHOTO_MAX_KB * 1024 * 1.37 && quality > 0.15) {
        quality -= 0.1;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }

      callback(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function removePhoto(taskId, photoIndex) {
  const t = tasks.find(t => t.id === taskId);
  if (t && t.photos) {
    const removed = t.photos.splice(photoIndex, 1);
    pushUndo('删除照片');
    try {
      await db.collection('tasks').doc(t._id).update({ photos: t.photos, updatedAt: new Date() });
    } catch(e) {}
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    render();
    addLog(taskId, '删除照片', currentUser + ' 删除了照片', null);
    showToast('已删除照片');
  }
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function createCard(task) {
  const card = document.createElement('div');
  card.className = 'card';
  card.draggable = true;
  card.dataset.id = task.id;
  card.dataset.status = task.status;

  const initial = task.assignee ? task.assignee[0] : '?';
  const hasNote = task.note && task.note.trim();
  const photos = task.photos || [];
  const photoCount = photos.length;
  const today = new Date().toISOString().slice(0, 10);
  const deadlineOverdue = task.deadline && task.deadline < today;

  let photosHtml = '';
  photos.forEach((src, i) => {
    const safeSrc = src.replace(/'/g, "\\'").replace(/"/g, "&quot;");
    photosHtml += `<div class="photo-thumb" onclick="event.stopPropagation();openLightbox('${safeSrc}')">
      <img src="${src}" alt="附件${i+1}" loading="lazy" />
      <button class="photo-remove" onclick="event.stopPropagation();removePhoto(${task.id},${i})" title="删除">×</button>
    </div>`;
  });

  card.innerHTML = `
    <input type="file" id="photo-input-${task.id}" accept="image/*" style="display:none" onchange="handlePhotoUpload(${task.id}, event)" />
    <button class="card-history" onclick="event.stopPropagation();showHistory(${task.id})" title="操作历史">📜</button>
    <button class="card-delete" onclick="deleteTask(${task.id})" title="删除">×</button>
    ${task.project ? `<span class="card-project">${escHtml(task.project)}</span>` : ''}
    <div class="card-title">${escHtml(task.title)}</div>
    <div class="card-meta">
      <span class="card-assignee"><span class="avatar">${initial}</span> ${escHtml(task.assignee || '未指派')}</span>
      <span style="display:inline-flex;align-items:center;gap:8px">
        ${task.date ? `<span class="card-date">${task.date}</span>` : ''}
        ${task.deadline ? `<span class="card-deadline ${deadlineOverdue ? 'overdue' : ''}" onclick="event.stopPropagation();setDeadline(${task.id})" style="cursor:pointer" title="点击修改截止日期"><span class="card-deadline-label">截止</span>${task.deadline}</span>` : `<button class="deadline-add-btn" onclick="event.stopPropagation();setDeadline(${task.id})">+截止</button>`}
      </span>
    </div>
    <div class="card-note">
      <button class="note-toggle" onclick="event.stopPropagation();toggleNote(${task.id})">
        <span class="note-icon">${hasNote ? '📝' : '✏️'}</span>
        <span>${hasNote ? '备注' : '添加备注'}</span>
      </button>
      ${hasNote ? `<div class="note-preview" data-task-id="${task.id}">${escHtml(task.note)}</div>` : `<div class="note-preview" data-task-id="${task.id}" style="display:none"></div>`}
      <div class="note-area" data-task-id="${task.id}">
        <textarea placeholder="写点什么..." oninput="saveNote(${task.id})" onblur="pushNoteUndo(${task.id})" onclick="event.stopPropagation()">${escHtml(task.note || '')}</textarea>
        <div class="note-save-hint">自动保存</div>
      </div>
    </div>
    <div class="card-photos">
      <button class="photo-toggle" onclick="event.stopPropagation();triggerPhotoInput(${task.id})">
        <span>📷</span>
        <span>${photoCount > 0 ? '照片' : '上传照片'}</span>
        ${photoCount > 0 ? `<span class="photo-count">${photoCount}</span>` : ''}
      </button>
      ${photoCount > 0 ? `<div class="photo-grid">${photosHtml}<button class="photo-add-btn" onclick="event.stopPropagation();triggerPhotoInput(${task.id})" title="添加照片">+</button></div>` : ''}
    </div>
    <div class="card-actions">
      <button class="status-btn btn-todo ${task.status==='todo'?'active':''}" onclick="event.stopPropagation();setStatus(${task.id},'todo')">未开始</button>
      <button class="status-btn btn-doing ${task.status==='doing'?'active':''}" onclick="event.stopPropagation();setStatus(${task.id},'doing')">进行中</button>
      <button class="status-btn btn-done ${task.status==='done'?'active':''}" onclick="event.stopPropagation();setStatus(${task.id},'done')">已完成</button>
    </div>
  `;

  // HTML5 Drag
  card.addEventListener('dragstart', e => {
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', task.id);
    setTimeout(() => card.style.opacity = '0.4', 0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    card.style.opacity = '';
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over-todo', 'drag-over-doing', 'drag-over-done'));
  });

  return card;
}

// ========== Actions ==========
async function setStatus(id, status) {
  const t = tasks.find(t => t.id === id);
  if (t && t.status !== status) {
    const statusLabels = { todo: '未开始', doing: '进行中', done: '已完成' };
    await cloudUpdateTask(id, { status }, '状态改为' + statusLabels[status],
      currentUser + ' 将状态从 ' + statusLabels[t.status] + ' 改为 ' + statusLabels[status]);
    updateUndoRedoBtns();
  }
}

async function deleteTask(id) {
  await cloudDeleteTask(id);
}

async function setDeadline(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const input = document.createElement('input');
  input.type = 'date';
  input.value = t.deadline || '';
  input.style.position = 'fixed';
  input.style.opacity = '0';
  input.style.pointerEvents = 'none';
  document.body.appendChild(input);
  const picker = input;
  picker.addEventListener('change', async () => {
    await cloudUpdateTask(id, { deadline: picker.value }, '设置截止日期',
      currentUser + ' 设置截止日期为 ' + picker.value);
    updateUndoRedoBtns();
    if (picker.value) showToast('已设置截止日期: ' + picker.value);
    document.body.removeChild(picker);
  });
  picker.addEventListener('blur', () => {
    setTimeout(() => { if (document.body.contains(picker)) document.body.removeChild(picker); }, 200);
  });
  picker.showPicker ? picker.showPicker() : picker.click();
}

async function addTask() {
  const title = document.getElementById('task-input').value.trim();
  if (!title) return;
  const project = document.getElementById('project-input').value.trim();
  const assignee = document.getElementById('assignee-input').value.trim();
  const date = document.getElementById('date-input').value;
  await cloudAddTask({ project, title, assignee, date, deadline: '', status: 'todo', note: '', photos: [] });
  document.getElementById('project-input').value = '';
  document.getElementById('task-input').value = '';
  document.getElementById('assignee-input').value = '';
  document.getElementById('date-input').value = '';
}

async function saveNote(id) {
  const textarea = document.querySelector(`.note-area[data-task-id="${id}"] textarea`);
  if (!textarea) return;
  const t = tasks.find(t => t.id === id);
  if (t) {
    t.note = textarea.value;
    const preview = document.querySelector(`.note-preview[data-task-id="${id}"]`);
    if (preview) {
      preview.textContent = textarea.value;
      preview.style.display = textarea.value ? 'block' : 'none';
    }
    // Debounced cloud save
    clearTimeout(t._noteTimer);
    t._noteTimer = setTimeout(async () => {
      try {
        await db.collection('tasks').doc(t._id).update({ note: t.note, updatedAt: new Date() });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      } catch(e) {}
    }, 800);
  }
}

function pushNoteUndo(id) {
  pushUndo('修改备注');
}

// ========== History ==========
async function showHistory(taskId) {
  const modal = document.getElementById('history-modal');
  const list = document.getElementById('history-list');
  list.innerHTML = '<div class="history-empty">加载中...</div>';
  modal.classList.remove('hidden');

  try {
    const res = await db.collection('task_logs')
      .where({ taskId: taskId })
      .orderBy('time', 'desc')
      .limit(50)
      .get();

    if (res.data.length === 0) {
      list.innerHTML = '<div class="history-empty">暂无操作记录</div>';
      return;
    }

    list.innerHTML = '';
    res.data.forEach(log => {
      const time = log.time ? new Date(log.time).toLocaleString('zh-CN') : '未知时间';
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div><span class="h-user">${escHtml(log.user || '未知')}</span> <span class="h-time">${time}</span></div>
        <div class="h-action">${escHtml(log.detail || log.action)}</div>
        ${log.snapshot ? `<button class="h-restore" onclick="event.stopPropagation();restoreFromHistory('${log._id}', ${taskId})">恢复此版本</button>` : ''}
      `;
      list.appendChild(item);
    });
  } catch (e) {
    list.innerHTML = '<div class="history-empty">加载失败</div>';
    console.error('Load history failed:', e);
  }
}

async function restoreFromHistory(logId, taskId) {
  try {
    const logRes = await db.collection('task_logs').doc(logId).get();
    const log = logRes.data[0] || logRes.data;
    if (!log || !log.snapshot) { showToast('无法恢复：缺少快照'); return; }

    const snapshot = log.snapshot;
    const t = tasks.find(t => t.id === taskId);
    if (!t) return;

    pushUndo('恢复历史版本');
    const changes = {
      project: snapshot.project,
      title: snapshot.title,
      assignee: snapshot.assignee,
      date: snapshot.date,
      deadline: snapshot.deadline,
      status: snapshot.status,
      note: snapshot.note,
    };

    Object.assign(t, changes);
    t.updatedAt = new Date();
    await db.collection('tasks').doc(t._id).update({ ...changes, updatedAt: new Date() });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    render();
    updateUndoRedoBtns();
    addLog(taskId, '恢复历史版本', currentUser + ' 恢复到历史版本', null);
    closeHistory();
    showToast('已恢复到历史版本');
  } catch (e) {
    console.error('Restore failed:', e);
    showToast('恢复失败');
  }
}

function closeHistory() {
  document.getElementById('history-modal').classList.add('hidden');
}

// ========== Keyboard ==========
document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

document.getElementById('date-input').value = new Date().toISOString().slice(0, 10);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    closeHistory();
  }
  const tag = document.activeElement.tagName.toLowerCase();
  const inInput = tag === 'textarea' || tag === 'input';

  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (inInput) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
    if (inInput) return;
    e.preventDefault();
    redo();
  }
});

// Drop zones
document.querySelectorAll('.column').forEach(col => {
  const status = col.dataset.status;
  const highlightClass = 'drag-over-' + status;
  col.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; col.classList.add(highlightClass); });
  col.addEventListener('dragenter', e => { e.preventDefault(); col.classList.add(highlightClass); });
  col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.classList.remove(highlightClass); });
  col.addEventListener('drop', e => { e.preventDefault(); col.classList.remove(highlightClass); setStatus(parseInt(e.dataTransfer.getData('text/plain')), col.dataset.status); });
});

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// Initial render (empty until data loads)
render();
updateUndoRedoBtns();
</script>
</body>
</html>
